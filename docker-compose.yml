services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitness_app}:${POSTGRES_PASSWORD:-change-this-postgres-password}@db:5432/${POSTGRES_DB:-fitness_app}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness_app}
      POSTGRES_USER: ${POSTGRES_USER:-fitness_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
