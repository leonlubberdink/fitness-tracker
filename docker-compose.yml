services:
  caddy:
    image: caddy:2.10
    depends_on:
      app:
        condition: service_started
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitness_app}:${POSTGRES_PASSWORD:-change-this-postgres-password}@db:5432/${POSTGRES_DB:-fitness_app}
      APP_URL: ${APP_URL:-https://localhost}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
    expose:
      - "3000"
    restart: unless-stopped

  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness_app}
      POSTGRES_USER: ${POSTGRES_USER:-fitness_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
