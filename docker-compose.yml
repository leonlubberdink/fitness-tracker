services:
  caddy:
    image: caddy:2.10
    depends_on:
      app:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      APP_URL: ${APP_URL:-https://localhost}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-fitness_app}
      PGPASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
      PGDATABASE: ${POSTGRES_DB:-fitness_app}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  drizzle-gateway:
    image: ghcr.io/drizzle-team/gateway:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4983
      STORE_PATH: /app
      MASTERPASS: ${DRIZZLE_GATEWAY_MASTERPASS:?DRIZZLE_GATEWAY_MASTERPASS must be set}
      DATABASE_URL_fitness: postgresql://${POSTGRES_USER:-fitness_app}:${POSTGRES_PASSWORD:-change-this-postgres-password}@db:5432/${POSTGRES_DB:-fitness_app}
    ports:
      - "127.0.0.1:4983:4983"
    restart: unless-stopped
    volumes:
      - drizzle_gateway_data:/app

  db:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitness_app}
      POSTGRES_USER: ${POSTGRES_USER:-fitness_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-postgres-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  drizzle_gateway_data:
  caddy_data:
  caddy_config:
