name: Deploy To VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure SSH
        env:
          VPS_SSH_KEY_BASE64: ${{ secrets.VPS_SSH_KEY_BASE64 }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          if [ -n "$VPS_SSH_KEY_BASE64" ]; then
            printf '%s' "$VPS_SSH_KEY_BASE64" | base64 --decode > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -l -f ~/.ssh/id_ed25519 > /dev/null
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_BRANCH: ${{ github.ref_name }}
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -p "${VPS_PORT:-22}" \
            "${VPS_USER}@${VPS_HOST}" \
            "APP_DIR='${VPS_APP_DIR}' BRANCH='${VPS_BRANCH}' bash -s" \
            < scripts/deploy-vps.sh

      - name: Verify public health endpoint
        env:
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL secret is not set. Skipping public health check."
            exit 0
          fi

          curl \
            --fail \
            --retry 10 \
            --retry-delay 5 \
            --retry-connrefused \
            "${APP_URL}/api/health"
